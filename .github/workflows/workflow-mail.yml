name: JEPX Send Report

on:
  schedule:
    - cron: '0 4 * * 1-5'   # JST 13:00 (UTC 4:00) 月〜金
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libxcomposite1 libxdamage1 libxrandr2

      # ★修正: env を retry の外（ステップレベル）で定義し、command をシンプルに
      - name: Send Daily Reports
        uses: nick-invision/retry@v3
        env:
          MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        with:
          timeout_minutes: 5
          max_attempts: 5
          retry_wait_seconds: 300
          command: python send_daily_report.py  
