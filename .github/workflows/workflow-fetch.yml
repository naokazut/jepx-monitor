name: JEPX Fetch Data

on:
  schedule:
    - cron: '30 3 * * 1-5'   # JST 12:30 (UTC 3:30) 月〜金
  workflow_dispatch:           # 手動実行用ボタン

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Latest Data
        # 12:30開始、10分間隔で最大6回リトライ（最遅 13:20 まで試行）
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 6
          retry_wait_seconds: 600
          command: python fetch_data.py

      - name: Commit and Push
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Update JEPX data [skip ci]"
          git push
