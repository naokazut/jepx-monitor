name: JEPX Daily Update and Report

on:
  schedule:
    # 毎日 日本時間 13:30 (UTC 4:30) 実行
    # 月〜金(1-5)に限定
    - cron: '30 4 * * 1-5'
  workflow_dispatch: # 手動実行用ボタン

jobs:
  update-and-mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # グラフ画像生成(kaleido)に必要なシステムライブラリ
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libxcomposite1 libxdamage1 libxrandr2

      - name: Fetch Latest Data
        # データがまだ公示されていない場合に備え、5分間隔で最大3回リトライ
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          retry_wait_seconds: 300
          command: python fetch_data.py

      - name: Send Daily Reports
        env:
          MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        # ファイル名を send_daily_report.py に指定
        run: python send_daily_report.py

      - name: Commit and Push
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Update JEPX data [skip ci]"
          git push
