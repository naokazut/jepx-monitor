name: JEPX Daily Update and Report

on:
  schedule:
    # 毎日 日本時間 13:00 (UTC 4:00) 実行
    - cron: '0 4 * * 1-5'
  workflow_dispatch: # 手動実行ボタン用

jobs:
  update-and-mail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch Latest Data
        run: python fetch_data.py

      - name: Send Daily Reports
        env:
          MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: python send_daily_report.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Update JEPX data and send reports [skip ci]"
          git push
